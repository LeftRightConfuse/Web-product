services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - .env
    command: 
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf   # ใช้ my.cnf เพื่อปรับแต่งการตั้งค่า MySQL
      - ./mysql/logs:/var/log/mysql               # เก็บ slow query log ออกมานอก container
      - ./backup:/backup            # เก็บ backup ออกมานอก container
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backup:
    image: mysql:8.0
    container_name: db_backup
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Bangkok
    volumes:
      - ./backup:/backup
    entrypoint: >
      sh -c "
      while true; do
        mysqldump -h mysql -u root -p$$MYSQL_ROOT_PASSWORD $$MYSQL_DATABASE \
        | gzip > /backup/backup_$$(date +%Y-%m-%d_%H-%M-%S).sql.gz &&
        echo \"$$(date) Backup successful\" >> /backup/backup.log ||
        echo \"$$(date) Backup failed\" >> /backup/backup.log;

        find /backup -type f -name '*.sql.gz' -mtime +7 -delete;

        sleep 3600;
      done
      "
      
  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env

  frontend:
    build: ./frontend
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data:
