version: "3.9"

services:

  mysql:
    image: mysql:8.0
    restart: always
    command: 
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf     # ใช้ my.cnf เพื่อปรับแต่งการตั้งค่า MySQL
      - ./mysql/logs:/var/log/mysql                  # เก็บ slow query log ออกมานอก container
  
  backup:
    image: mysql:8.0
    container_name: db_backup
    restart: always
    environment:
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    depends_on:
      - mysql
    volumes:
      - ./backup:/backup
    entrypoint: >
      sh -c "
      while true; do
        echo 'Starting backup...';
        mysqldump -h mysql -uroot -p${MYSQL_ROOT_PASSWORD} \
        --single-transaction \
        --routines \
        --triggers \
        --events \
        > /backup/price_db_backup_$(date +%F_%H-%M-%S).sql;
        echo 'Backup finished. Next backup in 24 hours.';
        sleep 86400;
      done
      "

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

  backend:
    build: ./backend
    ports:
    - "5000:5000"
    restart: always
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  mysql_data: